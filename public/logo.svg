<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 40" fill="none">
  <!-- Antipararell Logo — DNA Mark + Wordmark (dark background variant) -->

  <!-- DNA Three-Ring Symbol -->
  <g transform="translate(24, 20)">
    <ellipse cx="-14" cy="0" rx="12" ry="12" fill="none" stroke="#00FFBA" stroke-width="1.2"/>
    <ellipse cx="0" cy="0" rx="12" ry="12" fill="none" stroke="#00FFBA" stroke-width="1.2"/>
    <ellipse cx="14" cy="0" rx="12" ry="12" fill="none" stroke="#00FFBA" stroke-width="1.2"/>
    <!-- DNA strand lines -->
    <line x1="-6" y1="-8" x2="6" y2="-8" stroke="#00FFBA" stroke-width="0.6" opacity="0.6"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#00FFBA" stroke-width="0.6" opacity="0.6"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#00FFBA" stroke-width="0.6" opacity="0.6"/>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#00FFBA" stroke-width="0.6" opacity="0.6"/>
    <line x1="-6" y1="8" x2="6" y2="8" stroke="#00FFBA" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="54" y="27" font-family="'Cormorant Garamond', Georgia, serif" font-size="22" font-weight="300" letter-spacing="-0.5" fill="#00FFBA">
    antipararell
  </text>
</svg>
